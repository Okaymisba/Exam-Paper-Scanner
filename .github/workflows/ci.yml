name: CI

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
  pull_request:
    branches:
      - master
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Unit and integration tests (fast, no browser required)
  # ---------------------------------------------------------------------------
  unit-and-integration:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest

    env:
      FLASK_SECRET_KEY: ci-secret-key-for-tests
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-anon-key
      ADMIN_EMAIL: admin@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -m unit \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml \
            -v

      - name: Run integration tests with coverage
        run: |
          pytest tests/integration/ \
            -m integration \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml \
            -v

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage-unit.xml

      - name: Upload integration coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage-integration.xml

  # ---------------------------------------------------------------------------
  # E2E tests (optional - runs only when Playwright browsers can be installed)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # E2E tests run after unit and integration pass
    needs: unit-and-integration
    # E2E failures do not block the deploy step; they are informational
    continue-on-error: true

    env:
      FLASK_SECRET_KEY: ci-secret-key-for-tests
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-anon-key
      ADMIN_EMAIL: admin@example.com
      E2E_PORT: "54321"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ \
            -m e2e \
            --browser chromium \
            -v

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: test-results/

  # ---------------------------------------------------------------------------
  # Deploy to Vercel (only when all required tests pass on master/main)
  # ---------------------------------------------------------------------------
  deploy:
    name: Trigger Vercel Deploy
    runs-on: ubuntu-latest
    needs: unit-and-integration
    # Only deploy on pushes to master or main - not on pull requests
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set - skipping deploy trigger"
            exit 0
          fi
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
